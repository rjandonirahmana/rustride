name: Rust Docker CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rust-app:latest

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/rust-app:latest
            docker stop rust-app || true
            docker rm rust-app || true
            docker run -d \
              --name rust-app \
              --runtime=youki \
              -p 50051:50051 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e REDIS_URL="${{ secrets.REDIS_URL }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e R2_ACCOUNT_ID="${{ secrets.R2_ACCOUNT_ID }}" \
              -e R2_ACCESS_KEY_ID="${{ secrets.R2_ACCESS_KEY_ID }}" \
              -e R2_SECRET_ACCESS_KEY="${{ secrets.R2_SECRET_ACCESS_KEY }}" \
              -e R2_BUCKET_NAME="${{ secrets.R2_BUCKET_NAME }}" \
              -e R2_PUBLIC_URL="${{ secrets.R2_PUBLIC_URL }}" \
              -e WAHA_BASE_URL="${{ secrets.WAHA_BASE_URL }}" \
              -e WAHA_SESSION="${{ secrets.WAHA_SESSION }}" \
              -e WAHA_API_KEY="${{ secrets.WAHA_API_KEY}}"
              ${{ secrets.DOCKERHUB_USERNAME }}/rust-app:latest
