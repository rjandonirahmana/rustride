syntax = "proto3";
package driver;

service DriverService {
  // Order hari ini + summary sekaligus
  rpc GetTodayOrders(GetTodayOrdersReq)   returns (TodayOrdersRes);
  // Summary hari ini saja (tanpa list order)
  rpc GetTodaySummary(GetTodaySummaryReq) returns (TodaySummaryRes);
  // Earnings per periode
  rpc GetEarnings(GetEarningsReq)         returns (EarningsRes);
  // Riwayat order multi-hari dengan filter + pagination
  rpc GetOrderHistory(GetOrderHistoryReq) returns (OrderHistoryRes);
  // Detail satu order
  rpc GetOrderDetail(GetOrderDetailReq)   returns (DriverOrderDetail);
}

// ── Requests ──────────────────────────────────────────────────────────────────

message GetTodayOrdersReq  {}

message GetTodaySummaryReq {}

message GetEarningsReq {
  string period    = 1; // "today" | "week" | "month" | "custom"
  string date_from = 2; // "2026-03-01" — wajib jika period = "custom"
  string date_to   = 3; // "2026-03-22" — wajib jika period = "custom"
}

message GetOrderHistoryReq {
  string date_from    = 1; // "YYYY-MM-DD", kosong = tidak difilter
  string date_to      = 2; // "YYYY-MM-DD", kosong = tidak difilter
  string status       = 3; // "" = semua | "completed" | "cancelled"
  string service_type = 4; // "" = semua | "mobil" | "motor" | "send"
  int32  page         = 5; // mulai dari 1
  int32  limit        = 6; // default 20, max 100
}

message GetOrderDetailReq {
  string order_id = 1;
}

// ── Today Summary ─────────────────────────────────────────────────────────────

message TodaySummaryRes {
  int32  total_orders     = 1;
  int32  cancelled_orders = 2;
  int64  gross_earnings   = 3; // rupiah, sebelum potongan
  int64  net_earnings     = 4; // setelah potongan platform (80%)
  int64  tips             = 5;
  float  online_minutes   = 6;
  float  distance_km      = 7;
  float  avg_rating       = 8;
  string peak_hour        = 9; // e.g. "17:00-18:00"
}

// ── Today Orders (list + summary sekaligus) ───────────────────────────────────

message TodayOrdersRes {
  repeated DriverOrderItem orders  = 1;
  TodaySummaryRes          summary = 2;
}

// ── Earnings multi-period ─────────────────────────────────────────────────────

message EarningsRes {
  string                period         = 1; // echo dari request
  string                date_from      = 2;
  string                date_to        = 3;
  int64                 gross_earnings = 4;
  int64                 net_earnings   = 5;
  int64                 tips           = 6;
  int64                 platform_fee   = 7; // gross - net
  int32                 trip_count     = 8;
  int32                 cancel_count   = 9;
  float                 avg_per_trip   = 10; // net_earnings / trip_count
  float                 distance_km    = 11;
  float                 online_hours   = 12; // online_minutes / 60
  repeated DailyEarning daily          = 13;
}

message DailyEarning {
  string date         = 1; // "2026-03-22"
  int64  net_earnings = 2;
  int32  trip_count   = 3;
  float  distance_km  = 4;
}

// ── Order Item (ringkas, untuk list) ─────────────────────────────────────────

message DriverOrderItem {
  string order_id       = 1;
  string status         = 2; // "completed" | "cancelled"
  string rider_name     = 3;
  string pickup_address = 4;
  string dest_address   = 5;
  float  distance_km    = 6;
  int32  duration_min   = 7;
  int64  fare           = 8; // fare yang dibayar rider
  int64  driver_earning = 9; // fare * 80%
  int64  tip            = 10;
  string service_type   = 11; // "mobil" | "motor" | "send"
  string started_at     = 12; // ISO 8601
  string completed_at   = 13; // kosong jika cancelled
  string cancel_reason  = 14; // kosong jika completed
  float  rating         = 15; // 0 = belum dirating
  string rating_comment = 16;
}

// ── Order Detail (lengkap) ────────────────────────────────────────────────────

message DriverOrderDetail {
  DriverOrderItem     order        = 1;
  double              pickup_lat   = 2;
  double              pickup_lng   = 3;
  double              dest_lat     = 4;
  double              dest_lng     = 5;
  string              rider_phone  = 6;
  string              rider_avatar = 7;
  float               rider_rating = 8;
  repeated RoutePoint route        = 9;
}

message RoutePoint {
  double lat = 1;
  double lng = 2;
  int64  ts  = 3; // unix timestamp
}

// ── History (multi-day) ───────────────────────────────────────────────────────

message OrderHistoryRes {
  repeated DriverOrderItem orders   = 1;
  bool                     has_more = 2;
  int32                    total    = 3;
}
