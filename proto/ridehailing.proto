syntax = "proto3";
package app;

import "order.proto";
import "message.proto";
import "notification.proto";

service AppService {
  rpc Stream(stream ClientEvent) returns (stream ServerEvent);
}

message ClientEvent {
  oneof payload {
    PingReq            ping             = 1;
    WatchDriversReq    watch_drivers    = 2;
    LocationUpdate     location         = 3;
    BrowseOrdersReq    browse_orders    = 5;
    AcceptOrderReq     accept_order     = 6;
    RejectOrderReq     reject_order     = 7;
    ArrivedReq         arrived          = 8;
    StartTripReq       start_trip       = 9;
    CompleteTripReq    complete_trip    = 10;
    CancelTripReq      cancel_trip      = 11;
    WatchUserReq       watch_user       = 15;
    BrowseRideshareReq browse_rideshare = 20;
    JoinRideshareReq   join_rideshare   = 21;
    CancelRideshareReq cancel_rideshare = 22;
    AcceptPassengerReq accept_passenger = 23;
    RejectPassengerReq reject_passenger = 24;
    PickupPassengerReq pickup_passenger = 25;
    DropPassengerReq   drop_passenger   = 26;
    OpenRideshareReq   open_rideshare   = 27;
    CallOffer          call_offer       = 32;
    CallAnswer         call_answer      = 33;
    IceCandidate       ice_candidate    = 34;
    EndCallReq         end_call         = 35;
    EstimateFareReq    estimate_fare    = 36;
    RateReq            rate             = 37;

  }
}

message ServerEvent {
  oneof payload {
    ConnectedEvent                    connected         = 1;
    PongEvent                         pong              = 2;
    ErrorEvent                        error             = 3;
    NearbyDriversEvent                nearby_drivers    = 5;
    NearbyOrdersEvent                 nearby_orders     = 6;
    NewOrderOffer                     new_order         = 7;
    OrderStatusEvent                  order_status      = 8;
    DriverLocationEvent               driver_loc        = 9;
    message.NewMessageEvent           new_message       = 10;  // push dari server
    ReadReceiptEvent                  read_receipt      = 12;
    PresenceEvent                     presence          = 13;
    RatedEvent                        rated             = 15;
    NearbyRideshareEvent              nearby_rideshare  = 17;
    RideshareJoinedEvent              rideshare_joined  = 18;
    PassengerRequestEvent             passenger_request = 19;
    PassengerStatusEvent              passenger_status  = 20;
    RideshareStatusEvent              rideshare_status  = 21;
    RideshareOpenedEvent              rideshare_opened  = 22;
    notification.NewNotificationEvent new_notification  = 24;
    IncomingCallOffer                 incoming_call     = 26;
    IncomingCallAnswer                call_answer       = 27;
    IceCandidateEvent                 ice_candidate     = 28;
    CallEndedEvent                    call_ended        = 29;
    order.ActiveOrderEvent            current_order     = 30;
    order.FareEstimateEvent           fare_estimate     = 31;
    NotificationsEvent                notifications     = 32;
  }
}

// ── Shared ────────────────────────────────────────────────────
message PingReq          {}

message PongEvent        {}

message ConnectedEvent   { string user_id = 1; string role = 2; string username = 3; }

message ErrorEvent       { string code = 1; string message = 2; }

message RatedEvent       { string order_id = 1; uint32 rating = 2; }

message WatchUserReq     { string target_user_id = 1; }

message ReadReceiptEvent { string from_user_id = 1; string read_at = 2; }

message PresenceEvent    { string user_id = 1; bool online = 2; string last_seen = 3; }

message EstimateFareReq {
  double pickup_lat   = 1;
  double pickup_lng   = 2;
  double dest_lat     = 3;
  double dest_lng     = 4;
  string service_type = 5;
}

message RateReq {
  string order_id = 1;
  uint32 rating   = 2;
  string comment  = 3;
  double tip      = 4;
}

message NotificationsEvent {
  repeated NotificationItem items    = 1;
  bool                      has_more = 2;
}

message NotificationItem {
  int64  id         = 1;
  string title      = 2;
  string body       = 3;
  string type       = 4;
  string ref_id     = 5;
  bool   is_read    = 6;
  int64  created_at = 7;
}

// ── Ride-hailing ──────────────────────────────────────────────
message WatchDriversReq { double lat = 1; double lng = 2; string service_type = 3; }

message LocationUpdate  { double lat = 1; double lng = 2; float heading = 3; float speed = 4; }

message BrowseOrdersReq { double lat = 1; double lng = 2; string service_type = 3; float radius_km = 4; }

message AcceptOrderReq  { string order_id = 1; }

message RejectOrderReq  { string order_id = 1; }

message ArrivedReq      { string order_id = 1; }

message StartTripReq    { string order_id = 1; }

message CompleteTripReq { string order_id = 1; float distance_km = 2; }

message CancelTripReq   { string order_id = 1; string reason = 2; }

message NearbyDriversEvent { repeated NearbyDriverItem drivers = 1; }

message NearbyDriverItem {
  string driver_id  = 1;
  double lat        = 2;
  double lng        = 3;
  float  heading    = 4;
  float  distance_m = 5;
}

message NearbyOrdersEvent { repeated NearbyOrderItem orders = 1; uint32 total = 2; }

message NearbyOrderItem   { order.Order order = 1; float distance_to_pickup_m = 2; float eta_to_pickup_min = 3; }

message NewOrderOffer {
  order.Order order                = 1;
  float       distance_to_pickup_m = 2;
  float       eta_to_pickup_min    = 3;
  uint32      timeout_secs         = 4;
}

message OrderStatusEvent {
  string           order_id      = 1;
  string           status        = 2;
  order.DriverInfo driver        = 3;
  string           service_type  = 4;
  int32            fare_estimate = 5;
}

message DriverLocationEvent { string order_id = 1; double lat = 2; double lng = 3; float heading = 4; }

// ── Rideshare ─────────────────────────────────────────────────
message OpenRideshareReq   { string order_id = 1; int32 max_passengers = 2; int32 join_deadline_s = 3; }

message BrowseRideshareReq {
  double dest_lat     = 1;
  double dest_lng     = 2;
  double pickup_lat   = 3;
  double pickup_lng   = 4;
  string service_type = 5;
  float  radius_km    = 6;
}

message JoinRideshareReq {
  string trip_id        = 1;
  double pickup_lat     = 2;
  double pickup_lng     = 3;
  string pickup_address = 4;
  double dest_lat       = 5;
  double dest_lng       = 6;
  string dest_address   = 7;
}

message CancelRideshareReq { string passenger_id = 1; string trip_id = 2; string reason = 3; }

message AcceptPassengerReq { string passenger_id = 1; string trip_id = 2; }

message RejectPassengerReq { string passenger_id = 1; string trip_id = 2; string reason = 3; }

message PickupPassengerReq { string passenger_id = 1; string trip_id = 2; }

message DropPassengerReq   { string passenger_id = 1; string trip_id = 2; float distance_km = 3; }

message NearbyRideshareEvent  { repeated RideshareItem trips = 1; }

message RideshareJoinedEvent  { string passenger_id = 1; string trip_id = 2; int32 fare_estimate = 3; string status = 4; }

message RideshareOpenedEvent  { string trip_id = 1; string order_id = 2; int32 max_passengers = 3; }

message RideshareItem {
  string trip_id         = 1;
  string driver_id       = 2;
  string driver_name     = 3;
  string driver_avatar   = 4;
  string vehicle_plate   = 5;
  string vehicle_model   = 6;
  string vehicle_color   = 7;
  float  driver_rating   = 8;
  string service_type    = 9;
  double route_start_lat = 10;
  double route_start_lng = 11;
  double route_end_lat   = 12;
  double route_end_lng   = 13;
  int32  seats_available = 14;
  int32  fare_estimate   = 15;
  float  distance_km     = 16;
  string join_deadline   = 17;
}

message PassengerRequestEvent {
  string passenger_id   = 1;
  string trip_id        = 2;
  string rider_id       = 3;
  string rider_name     = 4;
  string rider_avatar   = 5;
  double pickup_lat     = 6;
  double pickup_lng     = 7;
  string pickup_address = 8;
  double dest_lat       = 9;
  double dest_lng       = 10;
  string dest_address   = 11;
  int32  fare_estimate  = 12;
  float  distance_km    = 13;
}

message PassengerStatusEvent {
  string passenger_id  = 1;
  string trip_id       = 2;
  string status        = 3;
  string reason        = 4;
  int32  fare_estimate = 5;
}

message RideshareStatusEvent {
  string trip_id          = 1;
  string status           = 2;
  int32  seats_available  = 3;
  string passenger_id     = 4;
  string passenger_status = 5;
}

// ── WebRTC ────────────────────────────────────────────────────
message CallOffer          { string target_user_id = 1; string sdp = 2; string order_id = 3; }

message CallAnswer         { string caller_id = 1; string sdp = 2; }

message IceCandidate       { string peer_id = 1; string candidate = 2; }

message EndCallReq         { string peer_id = 1; }

message IncomingCallOffer  { string caller_id = 1; string sdp = 2; }

message IncomingCallAnswer { string callee_id = 1; string sdp = 2; }

message IceCandidateEvent  { string peer_id = 1; string candidate = 2; }

message CallEndedEvent     { string peer_id = 1; }